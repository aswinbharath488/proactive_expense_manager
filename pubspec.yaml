publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  sqflite: ^2.4.2
  path: ^1.9.1
  uuid: ^4.5.1
  flutter_local_notifications: ^19.0.0
  http: ^1.4.0
  shared_preferences: ^2.5.3
  shimmer: ^3.0.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/Logo.png
